<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessor MCPD - Versió amb API de pagament</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --roig: #C00000; --gris: #f4f4f4; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background: var(--gris); color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: var(--roig); border-bottom: 3px solid var(--roig); padding-bottom: 10px; margin-top: 0; }
        .config-box { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; background: #fff9f9; padding: 15px; border-radius: 8px; border: 1px solid #ffeded; }
        label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.9em; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .log { background: #1e1e1e; color: #4ade80; padding: 15px; height: 180px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 12px; border-radius: 6px; margin: 20px 0; border: 2px solid #333; }
        .btn { background: var(--roig); color: white; border: none; padding: 15px; cursor: pointer; font-weight: bold; border-radius: 6px; font-size: 1.1em; transition: 0.3s; width: 100%; }
        .btn:hover { background: #900000; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        #taulaResultats { margin-top: 30px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 0.85em; }
        th { background: var(--roig); color: white; padding: 12px; text-align: left; }
        td { border: 1px solid #ddd; padding: 10px; vertical-align: top; }
        tr:nth-child(even) { background: #f9f9f9; }
        .badge { padding: 3px 7px; border-radius: 4px; font-weight: bold; font-size: 0.8em; }
        .b-a { background: #d1fae5; color: #065f46; }
        .b-b { background: #dbeafe; color: #1e40af; }
        .b-c { background: #fef3c7; color: #92400e; }
    </style>
</head>
<body>

<div class="container">
    <h1>Assessor de Competències Professionals Docents</h1>
    
    <div class="config-box">
        <div>
            <label>1. Clau API de Google AI Studio:</label>
            <input type="password" id="apiKey" placeholder="AIzaSy...">
        </div>
        <div>
            <label>2. Selecciona l'Excel de treball:</label>
            <input type="file" id="fileInput" accept=".xlsx">
        </div>
    </div>

    <div class="log" id="logPanel">SISTEMA A PUNT. Esperant dades...</div>

    <button class="btn" id="btnRun" onclick="iniciarAnalisi()">▶ EXECUTAR ANÀLISI COMPLET</button>

    <div id="taulaResultats"></div>
</div>

<script>
let dadesTreball = null;

const MODEL_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent";

const CONTEXT_MARC = `
REFERENCIAL TÈCNIC MCPD (DEPARTAMENT D'EDUCACIÓ DE CATALUNYA): Competències, Dimensions i Criteris

1. Planificació i avaluació (PDF D):
   - D1: Context d’actuació: C1.1 Sistema educatiu i context; C1.2 Vinculació al projecte de centre; C1.3 Reptes comunitaris.
   - D2: Coneixement de com s’aprèn: C2.1 Estratègies sobre com s’aprèn; C2.2 Variabilitat de l’aprenentatge; C2.3 Interacció per a l’aprenentatge.
   - D3: Àmbits, pedagogia i didàctica: C3.1 Interconnexió dels sabers; C3.2 Articulació de l’acció educativa; C3.3 Cocreació de processos d’acció educativa.
   - D4: Programació i avaluació de l’acció educativa: C4.1 Enfocament competencial; C4.2 Seqüència d’aprenentatge; C4.3 Estratègies d’avaluació i qualificació; C4.4 Organització de mesures i suports.
   - D5: Cultura democràtica: C5.1 Principis democràtics; C5.2 Ecosistema educatiu; C5.3 Ambient de benestar i aprenentatge.

2. Pràctica educativa (PDF P):
   - D1: Orientació educativa i acció tutorial: C1.1 Coneixement dels aprenents i expectatives positives; C1.2 Guiatge per al desenvolupament personal i social; C1.3 Guiatge per al desenvolupament acadèmic i professional.
   - D2: Gestió d’entorns i estratègies per a l’aprenentatge: C2.1 Organització flexible; C2.2 Metodologies diverses; C2.3 Mesures i suports (universals, addicionals i intensius).
   - D3: Regulació per a l’aprenentatge: C3.1 Metacognició i aprenentatge autoregulat; C3.2 Feed-up, retroacció i feed-forward; C3.3 Avaluació formativa i formadora.
   - D4: Gestió democràtica: C4.1 Participació i implicació de l’alumnat; C4.2 Clima positiu per a l’aprenentatge; C4.3 Identificació d’estereotips i prejudicis.

3. Docència informada en l'evidència (PDF E):
   - D1: Alfabetització en recerca: C1.1 Coneixement científic; C1.2 Pràctiques de referència informades; C1.3 Instruments de recerca.
   - D2: Reflexió sobre la pràctica: C2.1 Estratègies de reflexió; C2.2 Retroacció i generació de coneixement; C2.3 Impacte en la pràctica.
   - D3: Procés d’innovació: C3.1 Curiositat i experimentació; C3.2 Desenvolupament de la innovació; C3.3 Impacte en els resultats.
   - D4: Cultura professional de l’evidència: C4.1 Decisions informades; C4.2 Impacte en la professió; C4.3 Difusió i transferència.

4. Competència Digital Docent (PDF CDD):
   - D1: Compromís professional: C1.1 Comunicació organitzativa; C1.2 Participació i col·laboració professional; C1.3 Pràctica reflexiva; C1.4 Desenvolupament professional digital; C1.5 Protecció de dades i seguretat.
   - D2: Continguts digitals: C2.1 Cerca i selecció; C2.2 Creació i modificació; C2.3 Protecció, gestió i compartició.
   - D3: Ensenyament i aprenentatge: C3.1 Ensenyament; C3.2 Orientació i suport; C3.3 Aprenentatge col·laboratiu; C3.4 Aprenentatge autoregulat.
   - D4: Avaluació i retroacció: C4.1 Estratègies d’avaluació; C4.2 Analítiques d’aprenentatge; C4.3 Retroacció i presa de decisions.
   - D5: Empoderament de l’alumnat: C5.1 Accessibilitat i inclusió; C5.2 Atenció a les diferències personals; C5.3 Compromís actiu de l’alumnat.
   - D6: Desenvolupament de la competència digital de l’alumnat: C6.1 Alfabetització mediàtica; C6.2 Comunicació i ciutadania digital; C6.3 Creació de continguts; C6.4 Ús responsable; C6.5 Resolució de problemes.

5. Competència Comunicativa (PDF N):
   - D1: La llengua com a base de l’aprenentatge: C1.1 Llengua catalana; C1.2 Comunicació inclusiva; C1.3 TIL i TILC. 
   - D2: Estratègies de comunicació eficaç: C2.1 Verbals i no verbals; C2.2 Icòniques, audiovisuals i digitals; C2.3 Finalitat, context, canals i interlocutors.
   - D3: Interculturalitat i plurilingüisme: C3.1 Projecte lingüístic de centre; C3.2 Diversitat lingüística i cultural.
   - D4: Destreses comunicatives en llengües estrangeres: C4.1 Recurs comunicatiu; C4.2 Programes i projectes; C4.3 Aliances i xarxes.
   - D5: Art i cultura: C5.1 Llenguatges artístics; C5.2 Manifestacions artístiques i culturals; C5.3 Valor de l’art i la cultura.

6. Competència Socioemocional (PDF S):
   - D1: Consciència emocional: C1.1 Llenguatge emocional; C1.2 Comprensió emocional; C1.3 Legitimació. 
   - D2: Autogestió emocional: C2.1 Estratègies d’autogestió; C2.2 Emocions positives; C2.3 Emocions negatives.
   - D3: Consciència social: C3.1 Respecte per les diferències; C3.2 Esperit i pensament crític; C3.3 Prevenció de conflictes i convivència.
   - D4: Gestió del clima emocional: C4.1 Pertinença, seguretat emocional i confiança; C4.2 Acompanyament emocional; C4.3 Benestar personal i social.

7. Desenvolupament professional (PDF FF):
   - D1: Compromís ètic: C1.1 Implicació ètica; C1.2 Responsabilitats professionals; C1.3 Contribució a l’aprenentatge. 
   - D2: Aprenentatge docent: C2.1 Disposició per aprendre; C2.2 Projecció professional; C2.3 Comunitats i xarxes d’aprenentatge.
   - D3: Lideratge pedagògic: C3.1 Qualitat educativa; C3.2 Visió centrada en l’aprenentatge; C3.3 Mobilització del coneixement.
   - D4: Satisfacció i motivació professional: C4.1 Vàlua professional; C4.2 Responsabilitat en la presa de decisions; C4.3 Treball en equip i cooperació.

NIVELLS:
   - A1 Iniciació / Coneixement teòric inicial o pràctica incipient sense autonomia.
   - A2 Aplicació: coneix i aplica en contextos reals de manera tutelada.
   - B1 Aprofundiment / Adopció:   ús autònom i convencional dels recursos i procediments, integrant-los sistemàticament en el dia a dia sense necessitar supervisió constant.
   - B2 Consolidació / Adaptació: adapta i transfereix el coneixement a situacions noves de manera flexible, col·laborant amb l'equip.
   - C1 Innovació / Lideratge: El focus s'amplia a tot el centre educatiu; mentor, coordina projectes institucionals i dinamitza processos de recerca-acció.
   - C2 Transformació / Recerca: Expert, referent, innova, transforma i lidera canvis disruptius.`;

function escriureLog(msg, color = "#4ade80") {
    const p = document.getElementById('logPanel');
    const ara = new Date().toLocaleTimeString();
    p.innerHTML += `<div style="color:${color}">[${ara}] ${msg}</div>`;
    p.scrollTop = p.scrollHeight;
}

document.getElementById('fileInput').onchange = function(e) {
    if (!e.target.files[0]) return;
    const reader = new FileReader();
    reader.onload = function(evt) {
        try {
            const wb = XLSX.read(new Uint8Array(evt.target.result), {type: 'array'});
            dadesTreball = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            escriureLog(`📂 Fitxer carregat: ${dadesTreball.length} files detectades.`, "#fff");
        } catch(err) {
            escriureLog("❌ Error llegint l'Excel: " + err.message, "#ff4444");
        }
    };
    reader.readAsArrayBuffer(e.target.files[0]);
};

async function iniciarAnalisi() {
    const key = document.getElementById('apiKey').value.trim();
    if (!key) return alert("Posa la clau API!");
    if (!dadesTreball) return alert("Selecciona un fitxer Excel!");

    const btn = document.getElementById('btnRun');
    btn.disabled = true;
    let resultatsFinals = [];

    escriureLog("🤖 Model: gemini-2.5-flash", "#fff");

    try {
        for (let i = 0; i < dadesTreball.length; i++) {
            const fila = dadesTreball[i];
            escriureLog(`Processant ${i+1}/${dadesTreball.length}: ${fila.Títol || 'Fila '+(i+1)}`);

            const prompt = `${CONTEXT_MARC}

Ets l'assessor expert en competències professionals docents del Departament d'Educació de Catalunya. La teva funció és donar suport als tècnics i tècniques gestors del Departament d’Educació que planifiquen i dissenyen activitats de formació per al professorat.
La teva tasca principal és **identificar i analitzar quines competències professionals docents es treballen en una activitat formativa**, així com determinar:
 Analitza les activitats formatives i retorna un JSON amb exactament aquestes claus:
- "Competencia": nom oficial de la competència principal
- "Dimensions": dimensions treballades amb número i nom (ex: "D2: Planificació, D3: Avaluació")
- "Criteris": criteris d'avaluació alineats amb l'activitat
- "Indicadors": codis numèrics i descripció (ex: "2.1 Situacions d'aprenentatge, 3.2 Avaluació formativa")
- "Nivell": NOMÉS el codi (A1, A2, B1, B2, C1 o C2)
- "Suggeriments": proposta concreta per pujar de nivell

ACTIVITAT: ${JSON.stringify(fila)}`;

            const response = await fetch(`${MODEL_URL}?key=${key}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                        temperature: 0.1,
                        maxOutputTokens: 1024,
                        responseMimeType: "application/json",
						thinkingConfig: { thinkingBudget: 0 }
                    }
                })
            });

            const resJson = await response.json();

            if (!response.ok) {
                throw new Error(resJson.error?.message || `Error HTTP ${response.status}`);
            }
            if (!resJson.candidates?.length) {
                throw new Error("Gemini no ha retornat contingut" + (resJson.promptFeedback?.blockReason ? ": " + resJson.promptFeedback.blockReason : ""));
            }

            const text = resJson.candidates[0]?.content?.parts?.[0]?.text;
            if (!text) throw new Error("Format de resposta inesperat");

            const aiData = JSON.parse(text);
            resultatsFinals.push({ ...fila, ...aiData });
            escriureLog(`   ✅ Fila ${i+1} completada.`);

            if (i < dadesTreball.length - 1) await new Promise(r => setTimeout(r, 1500));
        }

        dibuixarTaula(resultatsFinals);
        window.dadesDescarrega = resultatsFinals;
        escriureLog("🎉 ANÀLISI FINALITZAT!", "#fff");
        afegirBotoDescarrega();

    } catch (e) {
        escriureLog(`❌ Error: ${e.message}`, "#ff4444");
    } finally {
        btn.disabled = false;
    }
}

function dibuixarTaula(res) {
    let html = `<table><tr>
        <th>Títol</th><th>Competència</th><th>Nivell</th>
        <th>Dimensions</th><th>Criteris</th><th>Indicadors</th><th>Suggeriments</th>
    </tr>`;
    res.forEach(r => {
        const n = r.Nivell || "";
        const cl = n.startsWith('A') ? 'b-a' : n.startsWith('B') ? 'b-b' : 'b-c';
        html += `<tr>
            <td>${r.Títol || '-'}</td>
            <td><strong>${r.Competencia || '-'}</strong></td>
            <td><span class="badge ${cl}">${n}</span></td>
            <td>${r.Dimensions || '-'}</td>
            <td>${r.Criteris || '-'}</td>
            <td>${r.Indicadors || '-'}</td>
            <td><small>${r.Suggeriments || '-'}</small></td>
        </tr>`;
    });
    document.getElementById('taulaResultats').innerHTML = html + "</table>";
}

function afegirBotoDescarrega() {
    if (document.getElementById('btnDownload')) return;
    const btn = document.createElement('button');
    btn.id = "btnDownload";
    btn.className = "btn";
    btn.style.marginTop = "20px";
    btn.style.background = "#2d3748";
    btn.innerText = "📥 Descarregar Excel amb resultats";
    btn.onclick = function() {
        const ws = XLSX.utils.json_to_sheet(window.dadesDescarrega);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Resultats MCPD");
        XLSX.writeFile(wb, "Analisi_Competencies_Docents.xlsx");
    };
    document.getElementById('taulaResultats').appendChild(btn);
}
</script>

</body>
</html>
